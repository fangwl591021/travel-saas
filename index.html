<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sakura LINE OA SaaS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; font-family: "Noto Sans TC"; }
.sidebar-item:hover { background:#f3f4f6; cursor:pointer; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const WORKER_URL = "https://你的worker網址/api/data";

const { useState, useEffect } = React;

/* =========================
   APP
========================= */
function App() {

  const [page, setPage] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);

  const [loading, setLoading] = useState(false);
  const [merchants, setMerchants] = useState([]);
  const [stats, setStats] = useState({});

  /* =========================
     API: 商家
  ========================= */
  async function fetchMerchants() {
    setLoading(true);
    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ action:"getMerchants" })
      });
      const data = await res.json();
      setMerchants(data.data || []);
    } catch(e) {
      console.error(e);
    }
    setLoading(false);
  }

  /* =========================
     API: 統計
  ========================= */
  async function fetchStats() {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action:"getStats" })
    });
    const data = await res.json();
    setStats(data.data || {});
  }

  /* =========================
     init
  ========================= */
  useEffect(() => {
    fetchMerchants();
    fetchStats();
  }, []);

  /* =========================
     UI
  ========================= */
  return (
    <div style={{display:"flex",height:"100vh"}}>

      {/* ================= Sidebar ================= */}
      <div style={{
        width: collapsed ? 60 : 220,
        background:"#111827",
        color:"#fff",
        transition:"0.3s"
      }}>

        <div style={{padding:15,fontWeight:"bold"}}>
          {collapsed ? "S" : "Sakura SaaS"}
        </div>

        <div className="sidebar-item" onClick={()=>setPage("dashboard")} style={{padding:12}}>
          📊 {!collapsed && "儀表板"}
        </div>

        <div className="sidebar-item" onClick={()=>setPage("merchant")} style={{padding:12}}>
          🏪 {!collapsed && "商家管理"}
        </div>

        <div className="sidebar-item" onClick={()=>setPage("stats")} style={{padding:12}}>
          📈 {!collapsed && "統計"}
        </div>

        <div onClick={()=>setCollapsed(!collapsed)} style={{padding:12,marginTop:20}}>
          {collapsed ? "➡" : "⬅ 收合"}
        </div>
      </div>

      {/* ================= Content ================= */}
      <div style={{flex:1,background:"#f3f4f6",padding:20}}>

        {/* DASHBOARD */}
        {page==="dashboard" && (
          <div>
            <h1>儀表板</h1>

            <div style={{display:"flex",gap:20}}>

              <Card title="總使用次數" value={stats.total_usage || 0} />
              <Card title="已上架商家" value={stats.approved_count || 0} />
              <Card title="待審核" value={stats.pending_count || 0} />

            </div>
          </div>
        )}

        {/* MERCHANT */}
        {page==="merchant" && (
          <div>
            <h1>商家管理</h1>

            <button onClick={fetchMerchants}>
              重新整理
            </button>

            {loading ? <p>Loading...</p> : (

              <table border="1" cellPadding="8" style={{marginTop:20,background:"#fff"}}>
                <thead>
                  <tr>
                    <th>名稱</th>
                    <th>分類</th>
                    <th>使用次數</th>
                    <th>狀態</th>
                  </tr>
                </thead>

                <tbody>
                  {merchants.map((m,i)=>(
                    <tr key={i}>
                      <td>{m.名稱}</td>
                      <td>{m.分類}</td>
                      <td>{m.使用次數}</td>
                      <td>{m.狀態}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

            )}
          </div>
        )}

        {/* STATS */}
        {page==="stats" && (
          <div>
            <h1>統計分析</h1>
            <pre>{JSON.stringify(stats,null,2)}</pre>
          </div>
        )}

      </div>
    </div>
  );
}

/* =========================
   CARD
========================= */
function Card({title,value}) {
  return (
    <div style={{
      background:"#fff",
      padding:20,
      borderRadius:10,
      minWidth:150
    }}>
      <div>{title}</div>
      <div style={{fontSize:28,fontWeight:"bold"}}>
        {value}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
