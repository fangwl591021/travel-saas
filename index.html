<!-- 
  File: index.html
  Version: 2.2.0
  Description: LINE OA Management Platform - Production Ready (Fixed JSX Rendering)
  Note: This file includes Babel for browser-side transpilation.
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura LINE OA Manager</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            font-weight: 400; 
            -webkit-font-smoothing: antialiased;
            color: #333333;
        }
        
        .line-green { color: #06C755; }
        .bg-line-green { background-color: #06C755; }
        .border-line-green { border-color: #06C755; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* 增加文字大小與清晰度 */
        .text-base-custom { font-size: 16px; line-height: 1.6; }
        .text-sub-custom { font-size: 14px; color: #666666; }
        .text-title-custom { font-size: 19px; font-weight: 500; }
    </style>
</head>
<body class="bg-[#f4f5f7] overflow-hidden">
    <div id="root"></div>

    <!-- 必須標記為 text/babel 才能讓瀏覽器執行 JSX -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Send: <><line x1="22" y1="2" x2="11" y2="13"/><path d="m22 2-7 20-4-9-9-4Z"/></>,
                RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
                ShoppingBag: <><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></>,
                Database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></>,
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                ChevronDown: <path d="m6 9 6 6 6-6"/>,
                Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const WORKER_URL = "https://sakura.fangwl591021.workers.dev";

        function App() {
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [expandedMenus, setExpandedMenus] = useState(['home', 'merchant-sub']);
            const [merchants, setMerchants] = useState([]);
            const [loading, setLoading] = useState(false);

            const menuData = [
                {
                    id: 'home', title: '主頁', icon: 'Home',
                    children: [
                        { id: 'broadcast', title: '群發訊息', icon: 'Send' },
                        { id: 'merchant-sub', title: '特約商管理', icon: 'ShoppingBag', items: ['廠商審核', '績效排行榜'] },
                        { id: 'auto-reply', title: '自動回應', icon: 'RotateCcw' }
                    ]
                },
                {
                    id: 'data-mgr', title: '資料管理', icon: 'Database',
                    children: [{ id: 'employee-db', title: '員工資料庫', icon: 'Users' }]
                }
            ];

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${WORKER_URL}/api/data`, {
                        method: 'POST',
                        body: JSON.stringify({ action: "getMerchants" })
                    });
                    const result = await res.json();
                    if (result.success) setMerchants(result.data);
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            return (
                <div className="flex h-screen overflow-hidden bg-[#f4f5f7]">
                    {/* Sidebar */}
                    <aside className={`bg-white border-r border-[#e6e6e6] flex flex-col transition-all duration-300 ${isSidebarCollapsed ? 'w-16' : 'w-60'}`}>
                        <div className="h-14 flex items-center px-4 border-b border-[#e6e6e6] gap-3">
                            <div className="w-8 h-8 bg-line-green rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-medium">L</div>
                            {!isSidebarCollapsed && <span className="text-base-custom font-medium text-[#111111] truncate">Sakura 管理後台</span>}
                        </div>

                        <div className="flex-1 overflow-y-auto scrollbar-hide py-3">
                            {menuData.map(main => (
                                <div key={main.id} className="mb-2">
                                    <button 
                                        onClick={() => setExpandedMenus(prev => prev.includes(main.id) ? prev.filter(m => m !== main.id) : [...prev, main.id])}
                                        className={`w-full flex items-center p-3 hover:bg-[#f9f9f9] ${expandedMenus.includes(main.id) ? 'line-green' : 'text-[#555555]'}`}
                                    >
                                        <Icon name={main.icon} size={22} />
                                        {!isSidebarCollapsed && <span className="ml-3 text-base-custom flex-1 text-left">{main.title}</span>}
                                    </button>
                                    
                                    {!isSidebarCollapsed && expandedMenus.includes(main.id) && main.children.map(sub => (
                                        <div key={sub.id} className="bg-[#fcfcfc] py-2 px-6 text-sub-custom hover:bg-[#f4f4f4] cursor-pointer flex items-center">
                                            <Icon name={sub.icon} size={18} className="opacity-60" />
                                            <span className="ml-3">{sub.title}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>

                        <button onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)} className="p-4 border-t border-[#e6e6e6] text-[#999999] flex items-center gap-2">
                            <Icon name={isSidebarCollapsed ? "ChevronRight" : "ChevronLeft"} size={22}/>
                            {!isSidebarCollapsed && <span className="text-sub-custom">收合選單</span>}
                        </button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="h-14 bg-white border-b border-[#e6e6e6] px-6 flex items-center justify-between">
                            <h2 className="text-title-custom text-[#111111]">特約商管理</h2>
                            <div className="text-sub-custom flex items-center gap-2">
                                <div className="w-8 h-8 bg-[#e0e0e0] rounded-full flex items-center justify-center text-[10px]">S</div>
                                <span>Sakura Admin</span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 scrollbar-hide">
                            <div className="max-w-6xl mx-auto space-y-6">
                                <div className="grid grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-lg border border-[#e6e6e6] shadow-sm">
                                        <p className="text-sub-custom mb-1">總核銷次數</p>
                                        <p className="text-[32px] text-[#111111]">{merchants.reduce((a, b) => a + (Number(b['使用次數']) || 0), 0)}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg border border-[#e6e6e6] shadow-sm">
                                        <p className="text-sub-custom mb-1 line-green">上架商家數</p>
                                        <p className="text-[32px] line-green">{merchants.filter(m => m['狀態'] === 'approved').length}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg border border-[#e6e6e6] shadow-sm">
                                        <p className="text-sub-custom mb-1 text-amber-600">待審核申請</p>
                                        <p className="text-[32px] text-amber-600">{merchants.filter(m => m['狀態'] === 'pending').length}</p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg border border-[#e6e6e6] shadow-sm overflow-hidden">
                                    <div className="p-5 border-b border-[#f0f0f0] flex justify-between items-center bg-[#fcfcfc]">
                                        <span className="text-base-custom font-medium">廠商審核與績效報表</span>
                                        <button onClick={fetchData} className="text-sub-custom line-green border border-line-green px-4 py-1 rounded">刷新數據</button>
                                    </div>
                                    <table className="w-full text-left">
                                        <thead className="bg-[#fcfcfc] border-b border-[#f0f0f0] text-[#888888]">
                                            <tr>
                                                <th className="p-4 text-sub-custom font-medium">廠商名稱</th>
                                                <th className="p-4 text-sub-custom font-medium">分類</th>
                                                <th className="p-4 text-sub-custom font-medium text-center">次數</th>
                                                <th className="p-4 text-sub-custom font-medium text-right">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-[#f5f5f5]">
                                            {merchants.map(m => (
                                                <tr key={m['ID']} className="hover:bg-[#fafafa]">
                                                    <td className="p-4 text-base-custom">{m['名稱']}</td>
                                                    <td className="p-4 text-sub-custom">{m['分類']}</td>
                                                    <td className="p-4 text-center line-green font-medium">{m['使用次數'] || 0}</td>
                                                    <td className="p-4 text-right text-sub-custom text-blue-500 hover:underline cursor-pointer">編輯</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
