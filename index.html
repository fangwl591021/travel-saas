<!-- 
  File: index.html
  Version: 2.1.1
  Description: LINE OA Management Platform Frontend - Clean Style (Renamed for GitHub Pages)
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura LINE OA 管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            font-weight: 400; 
            -webkit-font-smoothing: antialiased;
        }
        
        .line-green { color: #06C755; }
        .bg-line-green { background-color: #06C755; }
        .border-line-green { border-color: #06C755; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .text-main { font-size: 16px; }
        .text-sub { font-size: 14px; }
        .text-title { font-size: 18px; }
    </style>
</head>
<body class="bg-[#f4f5f7] overflow-hidden text-[#333333]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Send: <><line x1="22" y1="2" x2="11" y2="13"/><path d="m22 2-7 20-4-9-9-4Z"/></>,
                RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
                ShoppingBag: <><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></>,
                Database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></>,
                ChevronLeft: <path d="m15 18-6-6 6-6"/>,
                ChevronRight: <path d="m9 18 6-6-6-6"/>,
                ChevronDown: <path d="m6 9 6 6 6-6"/>,
                Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                QrCode: <><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v.01"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || <circle cx="12" cy="12" r="10" />}</svg>
            );
        };

        const WORKER_URL = "https://sakura.fangwl591021.workers.dev";

        function App() {
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [expandedMenus, setExpandedMenus] = useState(['home', 'merchant-sub']);
            const [role, setRole] = useState('admin');
            const [merchants, setMerchants] = useState([]);
            const [loading, setLoading] = useState(false);

            const menuData = [
                {
                    id: 'home', title: '主頁', icon: 'Home',
                    children: [
                        { id: 'broadcast', title: '群發訊息', icon: 'Send', items: [] },
                        { 
                            id: 'merchant-sub', title: '特約商管理', icon: 'ShoppingBag', 
                            items: ['廠商審核', '績效排行榜', '上架申請紀錄'] 
                        },
                        { id: 'auto-reply', title: '自動回應', icon: 'RotateCcw', items: ['關鍵字回應', 'AI 設定'] }
                    ]
                },
                {
                    id: 'data-mgr', title: '資料管理', icon: 'Database',
                    children: [
                        { id: 'employee-db', title: '員工資料庫', icon: 'Users', items: ['綁定名單', '權限管理'] }
                    ]
                }
            ];

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${WORKER_URL}/api/data`, {
                        method: 'POST',
                        body: JSON.stringify({ action: "getMerchants" })
                    });
                    const result = await res.json();
                    if (result.success) setMerchants(result.data);
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            const toggleMenu = (id) => {
                setExpandedMenus(prev => 
                    prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]
                );
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className={`bg-white border-r border-[#e6e6e6] flex flex-col transition-all duration-300 ${isSidebarCollapsed ? 'w-16' : 'w-60'}`}>
                        <div className="h-14 flex items-center px-4 border-b border-[#e6e6e6] gap-3 flex-shrink-0">
                            <div className="w-8 h-8 bg-line-green rounded-full flex-shrink-0 flex items-center justify-center text-white font-medium">L</div>
                            {!isSidebarCollapsed && <span className="text-main font-medium text-[#111111] truncate">Sakura 管理後台</span>}
                        </div>

                        <div className="flex-1 overflow-y-auto scrollbar-hide py-3">
                            {menuData.map(main => (
                                <div key={main.id} className="mb-2">
                                    <button 
                                        onClick={() => toggleMenu(main.id)}
                                        className={`w-full flex items-center p-3 hover:bg-[#f9f9f9] transition-colors ${expandedMenus.includes(main.id) ? 'line-green' : 'text-[#555555]'}`}
                                    >
                                        <Icon name={main.icon} size={22} />
                                        {!isSidebarCollapsed && (
                                            <div className="flex-1 flex items-center justify-between ml-3">
                                                <span className="text-main">{main.title}</span>
                                                {main.children.length > 0 && <Icon name={expandedMenus.includes(main.id) ? "ChevronDown" : "ChevronRight"} size={16}/>}
                                            </div>
                                        )}
                                    </button>

                                    {!isSidebarCollapsed && expandedMenus.includes(main.id) && main.children.map(sub => (
                                        <div key={sub.id} className="bg-[#fcfcfc]">
                                            <button 
                                                onClick={() => toggleMenu(sub.id)}
                                                className={`w-full flex items-center px-6 py-2.5 hover:bg-[#f4f4f4] transition-colors ${expandedMenus.includes(sub.id) ? 'line-green border-r-4 border-line-green' : 'text-[#666666]'}`}
                                            >
                                                <Icon name={sub.icon} size={18} className="opacity-70" />
                                                <span className="ml-3 flex-1 text-left text-sub">{sub.title}</span>
                                                {sub.items.length > 0 && <Icon name={expandedMenus.includes(sub.id) ? "ChevronDown" : "ChevronRight"} size={14}/>}
                                            </button>
                                            
                                            {expandedMenus.includes(sub.id) && sub.items.length > 0 && (
                                                <div className="pl-14 py-1">
                                                    {sub.items.map(item => (
                                                        <div key={item} className="py-2 text-sub text-[#888888] hover:text-line-green cursor-pointer transition-colors">
                                                            {item}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>

                        <button 
                            onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                            className="p-4 border-t border-[#e6e6e6] flex items-center gap-2 text-[#999999] hover:text-[#555555] transition-colors"
                        >
                            <Icon name={isSidebarCollapsed ? "ChevronRight" : "ChevronLeft"} size={22}/>
                            {!isSidebarCollapsed && <span className="text-sub">收合選單</span>}
                        </button>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 bg-[#f4f5f7]">
                        <header className="h-14 bg-white border-b border-[#e6e6e6] px-6 flex items-center justify-between z-10 flex-shrink-0">
                            <div className="flex items-center gap-3">
                                <h2 className="text-title font-medium text-[#111111]">特約商管理</h2>
                                <div className="flex items-center gap-1 text-sub text-[#999999]">
                                    <span>主頁</span>
                                    <Icon name="ChevronRight" size={12} />
                                    <span className="text-[#555555]">自動回應</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-5">
                                <div className="flex items-center gap-2 text-sub border rounded-full px-3 py-1 bg-[#f9f9f9]">
                                    <span className="text-[#888888]">目前權限：</span>
                                    <select 
                                        className="bg-transparent outline-none text-[#111111] font-medium"
                                        value={role} onChange={e => setRole(e.target.value)}
                                    >
                                        <option value="admin">系統管理員</option>
                                        <option value="merchant">合作廠商</option>
                                        <option value="employee">內部員工</option>
                                    </select>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-[#e0e0e0] rounded-full flex items-center justify-center text-[10px] text-[#777777]">S</div>
                                    <span className="text-sub font-medium">Sakura</span>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 md:p-8 scrollbar-hide">
                            <div className="max-w-6xl mx-auto space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-lg border border-[#e6e6e6] shadow-sm">
                                        <p className="text-sub text-[#888888] mb-1">總核銷次數</p>
                                        <p className="text-[32px] text-[#111111] leading-tight">{merchants.reduce((a, b) => a + (Number(b['使用次數']) || 0), 0)}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg border border-[#e6e6e6] shadow-sm">
                                        <p className="text-sub text-[#888888] mb-1 text-line-green">上架商家數</p>
                                        <p className="text-[32px] line-green leading-tight">{merchants.filter(m => m['狀態'] === 'approved').length}</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg border border-[#e6e6e6] shadow-sm">
                                        <p className="text-sub text-[#888888] mb-1 text-amber-600">待審核申請</p>
                                        <p className="text-[32px] text-amber-600 leading-tight">{merchants.filter(m => m['狀態'] === 'pending').length}</p>
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg border border-[#e6e6e6] shadow-sm overflow-hidden">
                                    <div className="p-5 border-b border-[#f0f0f0] flex justify-between items-center">
                                        <h3 className="text-main font-medium text-[#111111] flex items-center gap-2">
                                            <Icon name="Shield" size={20} className="line-green" /> 廠商審核與績效報表
                                        </h3>
                                        <button 
                                            onClick={fetchData} 
                                            className="text-sub text-line-green border border-line-green px-4 py-1.5 rounded hover:bg-green-50 transition-colors"
                                        >
                                            同步 Excel 資料
                                        </button>
                                    </div>
                                    
                                    {loading ? (
                                        <div className="flex flex-col items-center justify-center py-24 space-y-4">
                                            <div className="w-8 h-8 border-2 border-[#e6e6e6] border-t-line-green rounded-full animate-spin"></div>
                                            <p className="text-sub text-[#aaaaaa]">正在從 Google 試算表同步資料...</p>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead>
                                                    <tr className="bg-[#fcfcfc] text-[#888888] border-b border-[#f0f0f0]">
                                                        <th className="p-4 text-sub font-medium">廠商名稱 / 優惠內容</th>
                                                        <th className="p-4 text-sub font-medium">分類</th>
                                                        <th className="p-4 text-sub font-medium text-center">核銷次數</th>
                                                        <th className="p-4 text-sub font-medium">目前狀態</th>
                                                        <th className="p-4 text-sub font-medium text-right">管理</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-[#f5f5f5]">
                                                    {merchants.length === 0 ? (
                                                        <tr><td colSpan="5" className="p-20 text-center text-[#cccccc] text-main">目前尚無任何紀錄</td></tr>
                                                    ) : merchants.map(m => (
                                                        <tr key={m['ID']} className="hover:bg-[#fbfbfb] transition-colors">
                                                            <td className="p-4">
                                                                <div className="text-main text-[#111111] mb-0.5">{m['名稱']}</div>
                                                                <div className="text-sub text-[#999999]">{m['優惠內容']}</div>
                                                            </td>
                                                            <td className="p-4 text-sub text-[#666666]">
                                                                <span className="bg-[#f0f0f0] px-2 py-0.5 rounded text-[#777777]">{m['分類']}</span>
                                                            </td>
                                                            <td className="p-4 text-center text-main line-green font-medium">{m['使用次數'] || 0}</td>
                                                            <td className="p-4">
                                                                <span className={`px-2 py-1 rounded text-[12px] font-medium ${m['狀態'] === 'approved' ? 'bg-[#e7f9ee] text-[#06c755]' : 'bg-[#fff4e5] text-[#ff9800]'}`}>
                                                                    {m['狀態'] === 'approved' ? '已核准上架' : '待審核'}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-right">
                                                                <button className="text-sub text-blue-500 hover:underline">編輯項目</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
