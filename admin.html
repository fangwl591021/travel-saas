<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE OA 數位特約商後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { 
            Home, BarChart2, MessageCircle, Send, Layers, RotateCcw, 
            FileText, ShoppingBag, UserPlus, ChevronLeft, ChevronRight, 
            ChevronDown, ChevronUp, Settings, Database, PieChart 
        } = LucideReact;

        // 這裡放入你剛才看到的 app.jsx 內容
        function App() {
          const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
          const [activeMenu, setActiveMenu] = useState('auto-reply');

          const menuItems = [
            { id: 'broadcast', title: '群發訊息', icon: Send },
            { id: 'step-msg', title: '漸進式訊息', icon: Layers },
            { id: 'auto-reply', title: '自動回應', icon: RotateCcw, active: true },
            { id: 'msg-items', title: '訊息項目', icon: FileText },
            { id: 'promotion', title: '推廣相關', icon: ShoppingBag },
            { id: 'data', title: '資料管理', icon: Database },
          ];

          return (
            <div className="flex h-screen bg-slate-100 overflow-hidden font-sans text-slate-700">
              {/* 側邊導航欄 */}
              <aside className={`${isSidebarCollapsed ? 'w-16' : 'w-64'} bg-white border-r transition-all duration-300 flex flex-col`}>
                <div className="h-16 flex items-center px-4 border-b border-slate-100 gap-3 bg-white">
                  <div className="w-8 h-8 bg-green-600 rounded flex-shrink-0 flex items-center justify-center text-white font-bold shadow-sm">L</div>
                  {!isSidebarCollapsed && <span className="font-bold text-slate-800 truncate text-sm">Official Manager</span>}
                </div>

                <nav className="flex-1 py-4 overflow-y-auto">
                  {menuItems.map(item => (
                    <div key={item.id} className={`group cursor-pointer ${item.active ? 'text-green-600 bg-green-50/50 border-r-4 border-green-500' : 'text-slate-500 hover:bg-slate-50'}`}>
                      <div className="flex items-center px-4 py-3 gap-3">
                        <item.icon size={20} className={item.active ? 'text-green-600' : 'text-slate-400 group-hover:text-slate-600'} />
                        {!isSidebarCollapsed && <span className="text-sm font-medium flex-1">{item.title}</span>}
                        {!isSidebarCollapsed && <ChevronRight size={14} className="text-slate-300" />}
                      </div>
                    </div>
                  ))}
                </nav>

                <button 
                  onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                  className="p-4 border-t flex items-center gap-2 text-slate-400 hover:text-slate-600 transition-colors"
                >
                  {isSidebarCollapsed ? <ChevronRight size={20} /> : <><ChevronLeft size={20} /><span className="text-xs">收合選單</span></>}
                </button>
              </aside>

              {/* 主內容區 */}
              <main className="flex-1 flex flex-col min-w-0">
                <header className="h-16 bg-white border-b px-6 flex items-center justify-between shadow-sm z-10">
                  <div className="flex items-center gap-2 text-sm">
                    <span className="text-slate-400 font-bold text-xs tracking-wider">數位特約商系統</span>
                    <span className="text-slate-300">/</span>
                    <span className="text-slate-600 font-bold">自動回應</span>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-0.5 rounded border border-blue-100 uppercase">Verified</div>
                    <Settings size={18} className="text-slate-400 cursor-pointer hover:text-slate-600" />
                  </div>
                </header>

                <div className="p-4 md:p-8 overflow-y-auto">
                  <div className="max-w-5xl mx-auto space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="bg-white p-6 rounded-xl border shadow-sm">
                        <p className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">本月核銷總額</p>
                        <p className="text-3xl font-black text-slate-800">$42,800</p>
                      </div>
                      <div className="bg-white p-6 rounded-xl border shadow-sm">
                        <p className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">廠商總數</p>
                        <p className="text-3xl font-black text-slate-800">128 <span className="text-sm font-normal text-slate-400">家</span></p>
                      </div>
                      <div className="bg-white p-6 rounded-xl border shadow-sm border-l-4 border-l-green-500">
                        <p className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">員工綁定率</p>
                        <p className="text-3xl font-black text-green-600">92%</p>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
                      <div className="p-4 border-b font-bold flex justify-between items-center bg-slate-50">
                        <span className="text-sm">廠商審核與績效實時監控</span>
                        <button className="bg-green-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-green-700 shadow-sm transition-all font-bold">下載月報表</button>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                          <thead>
                            <tr className="bg-slate-50 text-left text-slate-500 border-b">
                              <th className="p-4 font-bold">廠商名稱</th>
                              <th className="p-4 font-bold">分類</th>
                              <th className="p-4 font-bold text-center">消費次數</th>
                              <th className="p-4 font-bold">狀態</th>
                              <th className="p-4 font-bold text-right">操作</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y">
                            {[
                              { name: '晨間廚房', cat: '餐飲', count: 142, status: '已上架' },
                              { name: '美廉社', cat: '零售', count: 85, status: '已上架' },
                              { name: '健身工廠', cat: '運動', count: 0, status: '審核中' },
                            ].map((row, i) => (
                              <tr key={i} className="hover:bg-slate-50 transition-colors">
                                <td className="p-4 font-bold text-slate-800">{row.name}</td>
                                <td className="p-4 text-slate-500">{row.cat}</td>
                                <td className="p-4 font-mono font-bold text-indigo-600 text-center">{row.count}</td>
                                <td className="p-4">
                                  <span className={`px-2 py-1 rounded-full text-[10px] font-bold shadow-sm ${row.status === '已上架' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-yellow-100 text-yellow-700 border border-yellow-200'}`}>
                                    {row.status}
                                  </span>
                                </td>
                                <td className="p-4 text-right">
                                  <button className="text-indigo-600 font-bold hover:underline">管理</button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
